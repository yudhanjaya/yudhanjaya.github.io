{%- assign image_url = include.image -%}
{%- assign alignment = include.align | default: "center" -%}
{%- assign caption = include.caption -%}
{%- assign width = include.width | default: "100%" -%}

{%- if image_url -%}
<figure class="photo photo-{{ alignment }}" style="width: {{ width }};">
  <img src="{{ image_url | relative_url }}" alt="{{ caption }}" />
  {%- if caption -%}
    <figcaption>{{ caption }}</figcaption>
  {%- endif -%}
</figure>
{%- endif -%}
